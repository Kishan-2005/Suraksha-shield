<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoneyShield X – AI Scam Detection System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0B0F19',
                        panel: '#151C2C',
                        primary: '#3B82F6',
                        accent: '#06B6D4',
                        success: '#10B981',
                        warning: '#F59E0B',
                        danger: '#EF4444'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0B0F19;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(21, 28, 44, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .chat-bubble {
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            max-width: 80%;
            font-size: 0.95rem;
            line-height: 1.4;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .chat-sender {
            background-color: #056162;
            color: white;
            border-bottom-right-radius: 0;
            align-self: flex-end;
        }

        .chat-receiver {
            background-color: #1F2937;
            color: white;
            border-bottom-left-radius: 0;
            align-self: flex-start;
        }

        .circular-chart {
            display: block;
            margin: 0 auto;
            max-width: 80%;
            max-height: 250px;
        }

        .circle-bg {
            fill: none;
            stroke: #1F2937;
            stroke-width: 3.8;
        }

        .circle {
            fill: none;
            stroke-width: 2.8;
            stroke-linecap: round;
            animation: progress 1.5s ease-out forwards;
        }

        @keyframes progress {
            0% {
                stroke-dasharray: 0 100;
            }
        }

        .pulse-border {
            animation: pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-border {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.5;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0B0F19;
        }

        ::-webkit-scrollbar-thumb {
            background: #1F2937;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }
    </style>
</head>

                                    </button>

                                    {/* Mobile menu button */}
                                    <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="lg:hidden p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-800 focus:outline-none">
                                        <IconMenu />
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Mobile Menu */}
                        {mobileMenuOpen && (
                            <div className="lg:hidden bg-panel border-b border-gray-800 absolute w-full shadow-2xl animate-fade-in">
                                <div className="px-2 pt-2 pb-3 space-y-1">
                                    {tabs.map((tab) => (
                                        <button
                                            key={tab.id}
                                            onClick={() => handleTabChange(tab.id)}
                                            className={`w-full text-left px-3 py-3 rounded-md text-base font-medium flex items-center gap-3 ${activeTab === tab.id
                                                    ? 'bg-primary/20 text-primary border-l-4 border-primary'
                                                    : 'text-gray-300 hover:bg-gray-800 hover:text-white border-l-4 border-transparent'
                                                }`}
                                        >
                                            {tab.icon}
                                            {tab.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 relative z-10">
                        {activeTab === 'dashboard' && <Dashboard t={t} />}
                        {activeTab === 'chat' && <ChatAnalysis t={t} />}
                        {activeTab === 'calls' && <CallDetection t={t} />}
                        {activeTab === 'profile' && <ProfileAnalyzer t={t} />}
                        {activeTab === 'timeline' && <Timeline t={t} />}
                        {activeTab === 'reports' && <Reports t={t} />}

                        {/* Alert Popup Component */}
                        {showAlert && (
                            <div className="fixed bottom-6 right-6 z-50 animate-bounce">
                                <div className="glass border-l-4 border-danger rounded-xl p-5 shadow-[0_10px_40px_rgba(239,68,68,0.2)] max-w-sm sm:max-w-md w-[calc(100vw-3rem)] sm:w-auto relative">
                                    <button onClick={() => setShowAlert(false)} className="absolute top-3 right-3 text-gray-400 hover:text-white">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                    </button>
                                    <div className="flex items-start pr-4">
                                        <div className="flex-shrink-0 bg-danger/20 p-2 rounded-lg">
                                            <IconAlertTriangle className="h-6 w-6 text-danger" />
                                        </div>
                                        <div className="ml-4">
                                            <h3 className="text-base font-bold text-danger mb-1">{t.highRiskDetected}</h3>
                                            <div className="text-sm text-gray-300">
                                                <ul className="list-disc pl-4 space-y-1 mt-2">
                                                    <li>{t.emoManipulation} <span className="text-danger font-semibold">(92%)</span></li>
                                                    <li>{t.financial}</li>
                                                    <li>{t.susIndicators}</li>
                                                </ul>
                                            </div>
                                            <div className="mt-5 flex gap-3">
                                                <button onClick={() => setShowAlert(false)} className="flex-1 bg-danger hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all shadow-lg shadow-danger/20 hover:-translate-y-0.5">
                                                    {t.block}
                                                </button>
                                                <button onClick={() => setShowAlert(false)} className="flex-1 bg-gray-800 hover:bg-gray-700 border border-gray-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-all hover:-translate-y-0.5">
                                                    {t.ignore}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
