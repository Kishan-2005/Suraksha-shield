<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HoneyShield X - AI Scam Detection</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
    
    @keyframes scanline {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    .animate-scanline { animation: scanline 2.5s ease-in-out infinite; }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
    .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    
    .glass-panel {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }
    .neon-border-red { box-shadow: 0 0 15px rgba(220,38,38,0.5), inset 0 0 10px rgba(220,38,38,0.2); }
    .neon-border-cyan { box-shadow: 0 0 15px rgba(6,182,212,0.5), inset 0 0 10px rgba(6,182,212,0.2); }
    .neon-text-cyan { text-shadow: 0 0 10px rgba(6,182,212,0.6); }
  </style>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.294.0"
      }
    }
  </script>
</head>
<body class="bg-[#020617] text-white">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import * as Lucide from 'lucide-react';
    
    // Auto map all lucide icons to global scope for easy use
    const {
      Shield, AlertTriangle, Phone, User, MessageCircle, Activity, LayoutDashboard,
      FileText, PhoneOff, Menu, Bell, Download, Play, Pause, FastForward,
      Cpu, Zap, Eye, Crosshair, Fingerprint, MapPin, BarChart2, CheckCircle2, CheckCircle, ScanLine,
      Lock, Globe, Database, BrainCircuit, ActivitySquare, UploadCloud, Image: ImageIcon, Scan, ShieldAlert,
      Share2, Heart, Clock, DollarSign, Unlock, TrendingUp, XOctagon, StopCircle, UserX, MessageSquare,
      Mail, ArrowRight, UserPlus, ArrowLeft, Key, CreditCard, LogOut, Settings, ShieldCheck, Users, AlertCircle, Send, X
    } = Lucide;


function IdentityRiskAnalyzer({ demoMode }) {
  const [images, setImages] = useState([]);
  const [analyzing, setAnalyzing] = useState(false);
  const [results, setResults] = useState(null);
  const fileInputRef = useRef(null);

  const handleFileChange = (e) => {
    if (e.target.files && e.target.files.length > 0) {
      const newImages = Array.from(e.target.files).map(file => URL.createObjectURL(file));
      setImages(prev => [...prev, ...newImages].slice(0, 4)); // Max 4 images
    }
  };

  const handleDrop = (e) => {
    e.preventDefault();
    if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
      const newImages = Array.from(e.dataTransfer.files)
        .filter(file => file.type.startsWith('image/'))
        .map(file => URL.createObjectURL(file));
      setImages(prev => [...prev, ...newImages].slice(0, 4));
    }
  };

  const removeImage = (idx) => {
    setImages(prev => prev.filter((_, i) => i !== idx));
  };

  const runAnalysis = () => {
    setAnalyzing(true);
    setResults(null);
    
    // Simulate API call delay
    setTimeout(() => {
      setAnalyzing(false);
      setResults({
        aiProb: 94,
        consistency: "Low Consistency",
        reverseMatch: "Match Found ⚠️",
        visualSuspicion: ["Too perfect face", "StyleGAN Artifacts", "Stock Image Detected"],
        riskScore: 88
      });
    }, 3000);
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fade-in">
      <div className="lg:col-span-5 space-y-6">
        <div className="glass-panel p-6 rounded-2xl border border-slate-700">
          <h2 className="text-lg font-bold uppercase tracking-widest flex items-center gap-2 mb-4">
            <User className="w-5 h-5 text-cyan-400" /> Target Profile
          </h2>
          
          <input 
            type="file" 
            ref={fileInputRef} 
            onChange={handleFileChange} 
            accept="image/*" 
            multiple 
            className="hidden" 
          />

          <div 
            className={`border-2 border-dashed ${images.length ? 'border-slate-600' : 'border-cyan-500/50 hover:border-cyan-400 bg-cyan-950/20'} rounded-xl p-8 text-center transition-all cursor-pointer relative overflow-hidden`}
            onDragOver={(e) => e.preventDefault()}
            onDrop={handleDrop}
            onClick={() => { if(images.length < 4) fileInputRef.current.click() }}
          >
            {images.length > 0 ? (
              <div className="grid grid-cols-2 gap-4">
                {images.map((img, idx) => (
                  <div key={idx} className="relative rounded-lg overflow-hidden border border-slate-700 group">
                    <img src={img} className={`w-full h-32 object-cover ${analyzing ? 'animate-pulse opacity-50' : ''}`} alt="Profile" />
                    <button 
                      onClick={(e) => { e.stopPropagation(); removeImage(idx); }}
                      className="absolute top-1 right-1 bg-red-500/80 p-1 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"
                    >
                      <X className="w-3 h-3 text-white" />
                    </button>
                    {analyzing && <div className="absolute top-0 left-0 w-full h-1 bg-cyan-400 animate-scanline shadow-[0_0_15px_rgba(6,182,212,1)]"></div>}
                  </div>
                ))}
                {images.length < 4 && (
                  <div className="border border-dashed border-slate-600 rounded-lg flex items-center justify-center h-32 text-slate-500 hover:text-slate-300">
                    <UploadCloud className="w-8 h-8" />
                  </div>
                )}
              </div>
            ) : (
              <div className="py-8">
                <UploadCloud className="w-12 h-12 text-cyan-500 mx-auto mb-4" />
                <p className="font-bold text-slate-300 mb-1">Click or Drag Images Here</p>
                <p className="text-xs text-slate-500 font-mono">Upload 1-4 images for analysis</p>
              </div>
            )}
          </div>

          <button 
            onClick={runAnalysis}
            disabled={images.length === 0 || analyzing}
            className="w-full mt-6 bg-cyan-600 hover:bg-cyan-500 disabled:opacity-50 text-white py-3 rounded-xl uppercase tracking-widest text-xs font-bold transition-all shadow-[0_0_15px_rgba(6,182,212,0.3)] flex justify-center items-center gap-2"
          >
            {analyzing ? <Scan className="w-4 h-4 animate-spin" /> : <ShieldAlert className="w-4 h-4" />}
            {analyzing ? 'Scanning Profile...' : 'Analyze Profile'}
          </button>
        </div>
      </div>

      <div className="lg:col-span-7">
        {analyzing && (
          <div className="glass-panel p-8 rounded-2xl border border-cyan-500/30 h-full flex flex-col justify-center">
            <h3 className="text-cyan-400 font-mono text-sm mb-6 flex items-center gap-2">
              <Cpu className="w-4 h-4 animate-pulse" /> PROCESSING BIOMETRICS
            </h3>
            <div className="space-y-4">
              <div className="flex items-center gap-3 text-slate-300"><CheckCircle className="w-4 h-4 text-cyan-500" /> Extracting facial geometry...</div>
              <div className="flex items-center gap-3 text-slate-300"><CheckCircle className="w-4 h-4 text-cyan-500" /> Running StyleGAN detection models...</div>
              <div className="flex items-center gap-3 text-slate-300"><Scan className="w-4 h-4 text-cyan-500 animate-spin" /> Cross-referencing 4.2B known scammer images...</div>
              <div className="flex items-center gap-3 text-slate-500"><Activity className="w-4 h-4" /> Calculating identity consistency...</div>
            </div>
          </div>
        )}

        {results && !analyzing && (
          <div className="glass-panel rounded-2xl border-2 border-red-500/50 neon-border-red overflow-hidden relative">
            <div className="absolute top-0 right-0 w-64 h-64 bg-red-600/10 rounded-full blur-[80px]"></div>
            
            <div className="bg-red-950/40 p-4 border-b border-red-900/50 flex justify-between items-center">
              <h3 className="font-black text-red-500 uppercase tracking-widest flex items-center gap-2">
                <AlertTriangle className="w-5 h-5" /> Threat Detected
              </h3>
              <div className="bg-red-500 text-white px-3 py-1 rounded text-xs font-bold uppercase tracking-wider shadow-[0_0_10px_rgba(220,38,38,0.5)]">
                HIGH RISK
              </div>
            </div>

            <div className="p-6 sm:p-8 space-y-8 relative z-10">
              <div className="flex flex-col sm:flex-row gap-8 items-center border-b border-slate-800 pb-8">
                <div className="relative w-40 h-40 flex items-center justify-center">
                  <svg viewBox="0 0 36 36" className="w-full h-full -rotate-90">
                    <path fill="none" stroke="#1e293b" strokeWidth="3" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    <path fill="none" stroke="#dc2626" strokeWidth="3" strokeDasharray={`${results.riskScore}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" style={{ filter: 'drop-shadow(0 0 8px rgba(220,38,38,0.8))' }} />
                  </svg>
                  <div className="absolute text-center flex flex-col items-center">
                    <span className="text-4xl font-black text-red-500">{results.riskScore}</span>
                    <span className="text-[9px] uppercase tracking-widest text-red-400 font-mono mt-1">Risk Score</span>
                  </div>
                </div>
                
                <div className="flex-1 space-y-4 w-full">
                  <div>
                    <div className="flex justify-between text-xs mb-1 font-mono uppercase text-slate-400">
                      <span>AI Generated Probability</span>
                      <span className="text-red-400 font-bold">{results.aiProb}%</span>
                    </div>
                    <div className="h-2 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-red-500 shadow-[0_0_10px_rgba(220,38,38,0.8)]" style={{width: `${results.aiProb}%`}}></div></div>
                  </div>
                  <div>
                    <div className="flex justify-between text-xs mb-1 font-mono uppercase text-slate-400">
                      <span>Identity Consistency</span>
                      <span className="text-amber-400 font-bold">{results.consistency}</span>
                    </div>
                    <div className="h-2 bg-slate-800 rounded-full overflow-hidden"><div className="h-full bg-amber-500" style={{width: '30%'}}></div></div>
                  </div>
                  <div className="bg-slate-900/80 p-3 rounded border border-slate-800 flex justify-between items-center">
                    <span className="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Reverse Image Search</span>
                    <span className="text-xs text-red-500 font-mono font-bold bg-red-500/10 px-2 py-1 rounded">{results.reverseMatch}</span>
                  </div>
                </div>
              </div>

              <div>
                <h4 className="text-xs uppercase tracking-widest text-slate-400 font-bold mb-4">Suspicious Indicators</h4>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {results.visualSuspicion.map((indicator, idx) => (
                    <div key={idx} className="flex items-start gap-3 bg-[#0b1120] p-3 rounded-lg border border-slate-800">
                      <AlertTriangle className="w-4 h-4 text-red-500 shrink-0 mt-0.5" />
                      <span className="text-sm text-slate-300">{indicator}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-red-500/10 border border-red-500/30 p-4 rounded-xl text-center">
                <p className="text-red-400 font-bold text-sm">⚠️ This profile shows strong signs of being fake or part of a scam.</p>
                <p className="text-slate-400 text-xs mt-1">Profile Trust Score: 12%</p>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


function ReportsDashboard({ demoMode }) {
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => {
    if (demoMode) {
      generateReport();
    }
  }, [demoMode]);

  const generateReport = () => {
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      setReport({
        riskScore: 82,
        riskLevel: "High",
        summary: "The conversation shows progressive emotional bonding followed by an urgent financial request. This strongly aligns with standard Romance Scam methodology.",
        patterns: [
          { type: "Emotional Manipulation", confidence: 87, icon: Heart, color: "text-pink-500", example: "I feel like you're the only one who understands me..." },
          { type: "Urgency", confidence: 92, icon: Clock, color: "text-amber-500", example: "I need help right now, it's an emergency!" },
          { type: "Financial Request", confidence: 96, icon: DollarSign, color: "text-red-500", example: "Can you send $500 via crypto urgently?" },
          { type: "Deepfake Suspicion", confidence: 64, icon: UserSquare, color: "text-orange-500", example: "Voice pitch anomalies detected in last call." }
        ],
        timeline: [
          { stage: "Initial Contact", risk: "safe", desc: "Casual greeting" },
          { stage: "Emotional Bonding", risk: "warning", desc: "Rapid attachment" },
          { stage: "Trust Building", risk: "warning", desc: "Isolation tactics" },
          { stage: "Financial Request", risk: "danger", desc: "Urgent crisis" }
        ],
        evidence: [
          { sender: "target", text: "I really care about you so much.", highlight: "" },
          { sender: "target", text: "But I have a huge problem. I need to send money to the hospital urgently.", highlight: "send money", highlightClass: "bg-red-500/20 text-red-500 font-bold px-1 rounded border border-red-500/50" }
        ]
      });
    }, 1500);
  };

  function UserSquare(props) { return <Database {...props} />; }

  return (
    <div className="space-y-6 animate-fade-in">
      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 border-b border-slate-800 pb-4">
        <div>
          <h2 className="text-2xl font-black uppercase tracking-widest text-white">AI Scam Intelligence Report</h2>
          <p className="text-xs text-slate-400 font-mono tracking-widest mt-1">Behavioral & Pattern-Based Detection Summary</p>
        </div>
        <div className="flex gap-2">
          <button onClick={generateReport} disabled={loading} className="px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded text-xs font-bold uppercase tracking-wider flex items-center gap-2 transition-colors">
            {loading ? <ActivitySquare className="w-4 h-4 animate-spin" /> : <FileText className="w-4 h-4" />} Generate Report
          </button>
          {report && (
            <>
              <button className="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded flex items-center gap-2 border border-slate-700 transition-colors">
                <Download className="w-4 h-4" />
              </button>
              <button className="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded flex items-center gap-2 border border-slate-700 transition-colors">
                <Share2 className="w-4 h-4" />
              </button>
            </>
          )}
        </div>
      </div>

      {!report && !loading && (
        <div className="glass-panel p-12 rounded-2xl flex flex-col items-center justify-center text-slate-500 border border-slate-800 border-dashed">
          <Shield className="w-16 h-16 mb-4 opacity-50" />
          <p className="font-mono text-sm uppercase tracking-widest">Awaiting Analysis</p>
          <p className="text-xs mt-2">Click "Generate Report" or enable Demo Mode to proceed.</p>
        </div>
      )}

      {loading && (
        <div className="glass-panel p-12 rounded-2xl flex flex-col items-center justify-center text-cyan-500 border border-cyan-500/30">
          <ActivitySquare className="w-16 h-16 mb-4 animate-spin" />
          <p className="font-mono text-sm uppercase tracking-widest animate-pulse">Synthesizing Telemetry...</p>
        </div>
      )}

      {report && (
        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
          <div className="lg:col-span-4 space-y-6">
            <div className="glass-panel p-6 rounded-2xl border-t-4 border-t-red-500 neon-border-red flex flex-col items-center">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest w-full text-left mb-6">Threat Assessment</h3>
              
              <div className="relative w-48 h-48 flex items-center justify-center">
                <svg viewBox="0 0 36 36" className="w-full h-full -rotate-90 drop-shadow-[0_0_15px_rgba(220,38,38,0.3)]">
                  <path fill="none" stroke="#1e293b" strokeWidth="2" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                  <path fill="none" stroke="#dc2626" strokeWidth="2" strokeDasharray={`${report.riskScore}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" style={{ filter: 'drop-shadow(0 0 5px #dc2626)' }} />
                </svg>
                <div className="absolute flex flex-col items-center text-center">
                  <span className="text-5xl font-black text-red-500">{report.riskScore}</span>
                  <span className="text-[10px] uppercase font-bold text-red-400 bg-red-500/10 px-2 py-0.5 rounded mt-2 border border-red-500/30">HIGH RISK</span>
                </div>
              </div>

              <div className="mt-8 bg-slate-900/80 p-4 rounded-xl border border-slate-800">
                <h4 className="text-[10px] uppercase tracking-widest text-slate-500 font-bold mb-2">AI Summary</h4>
                <p className="text-sm text-slate-300 leading-relaxed">{report.summary}</p>
              </div>
            </div>

            <div className="glass-panel p-6 rounded-2xl border border-slate-700">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Evidence Timeline</h3>
              <div className="relative pl-6 space-y-6">
                <div className="absolute left-[7px] top-2 bottom-2 w-0.5 bg-gradient-to-b from-emerald-500 via-amber-500 to-red-500"></div>
                {report.timeline.map((item, idx) => {
                  const colors = { safe: 'bg-emerald-500', warning: 'bg-amber-500', danger: 'bg-red-500 border-2 border-red-400 shadow-[0_0_10px_rgba(220,38,38,0.8)]' };
                  return (
                    <div key={idx} className="relative">
                      <div className={`absolute -left-[29px] w-3 h-3 rounded-full ${colors[item.risk]}`}></div>
                      <h4 className={`text-sm font-bold uppercase tracking-wider ${item.risk === 'danger' ? 'text-red-400' : 'text-slate-200'}`}>{item.stage}</h4>
                      <p className="text-xs text-slate-500 font-mono mt-1">{item.desc}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          <div className="lg:col-span-8 space-y-6">
            <div className="glass-panel p-6 rounded-2xl border border-slate-700">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Detected Patterns</h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {report.patterns.map((p, idx) => {
                  const Icon = p.icon;
                  return (
                    <div key={idx} className="bg-[#0b1120] p-4 rounded-xl border border-slate-800 hover:border-slate-600 transition-colors relative overflow-hidden">
                      <div className={`absolute top-0 right-0 w-16 h-16 ${p.color.replace('text', 'bg')}/10 rounded-full blur-xl`}></div>
                      <div className="flex justify-between items-start mb-3">
                        <div className="flex items-center gap-2">
                          <Icon className={`w-4 h-4 ${p.color}`} />
                          <span className="text-xs font-bold uppercase tracking-wider text-slate-200">{p.type}</span>
                        </div>
                        <span className={`text-[10px] font-mono font-bold px-2 py-0.5 rounded border ${p.color.replace('text-', 'text-').replace('text-', 'border-')}/30 ${p.color.replace('text-', 'bg-')}/10`}>
                          {p.confidence}% CONF
                        </span>
                      </div>
                      <p className="text-xs text-slate-400 italic">"{p.example}"</p>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="glass-panel p-6 rounded-2xl border border-slate-700">
              <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Message Evidence Viewer</h3>
              <div className="bg-[#090f1a] rounded-xl p-4 border border-slate-800 space-y-4">
                {report.evidence.map((msg, idx) => (
                  <div key={idx} className="bg-slate-900 border border-slate-700/50 rounded-lg p-3 max-w-[85%] self-start relative">
                    <span className="absolute -top-2 -left-2 bg-slate-800 text-slate-400 text-[8px] uppercase tracking-widest px-1.5 py-0.5 rounded border border-slate-700">Extracted</span>
                    <p className="text-sm text-slate-300 pt-2">
                      {msg.highlight ? (
                        <>
                          {msg.text.split(msg.highlight)[0]}
                          <span className={msg.highlightClass}>{msg.highlight}</span>
                          {msg.text.split(msg.highlight)[1]}
                        </>
                      ) : (
                        msg.text
                      )}
                    </p>
                  </div>
                ))}
              </div>
            </div>
            
            <div className="bg-blue-900/20 border border-blue-500/30 p-5 rounded-2xl">
              <h3 className="text-xs font-bold text-blue-400 uppercase tracking-widest mb-2 flex items-center gap-2"><CheckCircle className="w-4 h-4" /> Explainable AI Reasoning</h3>
              <p className="text-sm text-slate-300">{report.ai_explanation}</p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


function EDIEngine({ demoMode }) {
  const [data, setData] = useState({
    score: 12,
    velocity: 5,
    loveBombing: 10,
    isolation: 0,
    replacement: 0,
    financial: 0,
    status: "SAFE",
    color: "emerald"
  });

  useEffect(() => {
    if (demoMode) {
      setTimeout(() => {
        setData({
          score: 91,
          velocity: 88,
          loveBombing: 93,
          isolation: 84,
          replacement: 89,
          financial: 95,
          status: "CRITICAL",
          color: "red"
        });
      }, 1500);
    } else {
      setData({
        score: 12,
        velocity: 5,
        loveBombing: 10,
        isolation: 0,
        replacement: 0,
        financial: 0,
        status: "SAFE",
        color: "emerald"
      });
    }
  }, [demoMode]);

  const ProgressBar = ({ label, val, color }) => (
    <div className="mb-4">
      <div className="flex justify-between text-xs mb-1 font-mono uppercase text-slate-400">
        <span>{label}</span>
        <span className={`text-${color}-400 font-bold`}>{val}%</span>
      </div>
      <div className="h-2 bg-slate-800 rounded-full overflow-hidden">
        <div className={`h-full bg-${color}-500 transition-all duration-1000`} style={{ width: `${val}%` }}></div>
      </div>
    </div>
  );

  return (
    <div className="space-y-6 animate-fade-in">
      <div className="border-b border-slate-800 pb-4 flex justify-between items-end">
